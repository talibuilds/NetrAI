<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0" stop-color="#0B0A08"/>
    <stop offset="1" stop-color="#1A1408"/>
  </linearGradient>
  <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0" stop-color="#F6D875"/>
    <stop offset="0.5" stop-color="#D4AF37"/>
    <stop offset="1" stop-color="#8F6E1E"/>
  </linearGradient>
  <radialGradient id="irisGrad" cx="35%" cy="32%" r="75%">
    <stop offset="0" stop-color="#FBE7A1"/>
    <stop offset="1" stop-color="#B4881F"/>
  </radialGradient>
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0" stop-color="#D4AF37" stop-opacity="0.30"/>
    <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
  </radialGradient>
</defs>

<rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
<circle cx="256" cy="256" r="205" fill="url(#glow)"/>

<!-- detection frame corners -->
<g stroke="url(#goldGrad)" stroke-width="12" stroke-linecap="round" fill="none">
  <path d="M70,122 L70,72 L120,72"/>
  <path d="M392,72 L442,72 L442,122"/>
  <path d="M442,390 L442,440 L392,440"/>
  <path d="M120,440 L70,440 L70,390"/>
</g>

<!-- eye -->
<path d="M114,256 Q256,164 398,256 Q256,348 114,256 Z" fill="#0B0A08" stroke="url(#goldGrad)" stroke-width="10"/>

<!-- scan ring -->
<circle cx="256" cy="256" r="60" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-dasharray="9 8"/>

<!-- iris / precision marker -->
<circle cx="256" cy="256" r="43" fill="url(#irisGrad)"/>
<circle cx="256" cy="256" r="17" fill="#0B0A08"/>
<circle cx="256" cy="256" r="6" fill="#FBE7A1"/>
</svg>
