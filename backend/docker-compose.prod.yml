services:
  mongodb:
    image: mongo:7
    container_name: dammage-mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: dammage-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  backend:
    build: .
    container_name: dammage-backend
    ports:
      - "8000:8000"
    environment:
      # In-network hostnames (backend ↔ infra)
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
      MINIO_BUCKET: dammage
      # Public URL baked into response image links
      MINIO_PUBLIC_HOST: http://210.79.128.107:9000
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: dammage
      # CPU-only host — disable tiled waste inference for usable latency
      WASTE_TILED: "false"
      WASTE_CONF: "0.08"
      CLEANUP_RADIUS_M: "500"
      LOCATION_PRECISION: "4"
      INFERENCE_CONCURRENCY: "1"
      ADMIN_EMAILS: duanand6@gmail.com
    depends_on:
      - mongodb
      - minio
    restart: unless-stopped

volumes:
  mongo_data:
  minio_data:
